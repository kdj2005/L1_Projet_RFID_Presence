<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Dashboard - Nouvel Utilisateur</title>
    <style>
        :root {
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --border: #e2e8f0;
            --success: #16a34a;
            --error: #dc2626;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border);
        }

        h2 {
            margin: 0 0 8px 0;
            font-size: 24px;
            font-weight: 700;
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted);
            text-align: center;
            font-size: 14px;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
            transition: all 0.2s ease;
            background-color: #fcfcfd;
        }

        input:focus {
            border-color: var(--primary);
            background-color: var(--card-bg);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            background-color: var(--primary-hover);
        }

        #statusMessage {
            margin-top: 20px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .success {
            display: block !important;
            background-color: #f0fdf4;
            color: var(--success);
            border: 1px solid #bbf7d0;
        }

        .error {
            display: block !important;
            background-color: #fef2f2;
            color: var(--error);
            border: 1px solid #fecaca;
        }

        .loading {
            display: block !important;
            background-color: #f8fafc;
            color: var(--text-muted);
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Créer un compte</h2>
    <div class="subtitle">Ajouter un utilisateur et son badge NFC au système</div>
    
    <form id="registrationForm">
        <div class="form-group">
            <label for="cartId">Code Badge (Card ID)</label>
            <input type="text" id="cartId" required placeholder="Ex: 8bFF81607">
        </div>

        <div class="form-group">
            <label for="nom">Nom de famille</label>
            <input type="text" id="nom" required placeholder="Ex: zinsou">
        </div>
        
        <div class="form-group">
            <label for="prenom">Prénom</label>
            <input type="text" id="prenom" required placeholder="Ex: pierre">
        </div>
        
        <div class="form-group">
            <label for="email">Adresse Email</label>
            <input type="email" id="email" required placeholder="Ex: pierre@example.com">
        </div>
        
        <button type="submit">Enregistrer l'utilisateur</button>
    </form>

    <div id="statusMessage"></div>
</div>

<script>
    document.getElementById('registrationForm').addEventListener('submit', async (e) => {
        e.preventDefault(); 

        const status = document.getElementById('statusMessage');
        status.textContent = "Inscription en cours...";
        status.className = "loading";

        // Collecte des données avec le cartId inclus
        const payload = {
            cartId: document.getElementById('cartId').value,
            name: document.getElementById('nom').value,
            surname: document.getElementById('prenom').value,
            email: document.getElementById('email').value
        };
        const apiUrl=window.location.origin

        try {
            const response = await fetch(`${apiUrl}/api/user/creer`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            const data = await response.json();

            if (response.ok) {
                status.textContent = "Utilisateur enregistré avec succès !";
                status.className = "success";
                document.getElementById('registrationForm').reset(); 
            } else {
                status.textContent = `Erreur : ${data.message || 'Impossible de créer l\'utilisateur'}`;
                status.className = "error";
            }

        } catch (error) {
            console.error("Erreur backend:", error);
            status.textContent = "Impossible de joindre le serveur de présence.";
            status.className = "error";
        }
    });
</script>

</body>
</html>
